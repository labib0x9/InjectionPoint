<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CodeForge</title>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Syne:wght@400;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/static/editor.css">
</head>
<body>

<div class="body-wrap">

  <!-- SIDEBAR -->
  <div class="sidebar" id="sidebar">
    <div class="sidebar-toggle-btn" onclick="toggleSidebar()">
      <span id="sidebar-icon">◂</span>
    </div>
    <div class="problem-list" id="problem-list"></div>
  </div>

  <div class="main">

    <!-- LEFT PANEL -->
    <div class="left-panel" id="left-panel">
      <div class="panel-tabs">
        <button class="panel-tab active" onclick="switchTab(this,'tab-problem')">Problem</button>
        <button class="panel-tab" onclick="switchTab(this,'tab-hints')">Hints</button>
        <button class="panel-tab" onclick="switchTab(this,'tab-solution')">Solution</button>
      </div>
      <div class="panel-content" id="tab-problem"><div id="problem-description"></div></div>
      <div class="panel-content" id="tab-hints" style="display:none"><div class="hints" id="hints-content"></div></div>
      <div class="panel-content" id="tab-solution" style="display:none"><div id="solution-content" class="problem-body"></div></div>
    </div>

    <div class="resize-handle" id="resize-handle"></div>

    <!-- RIGHT PANEL -->
    <div class="right-panel">
      <div class="editor-topbar">
        <div class="file-tab-area">
          <div class="file-tab">
            <div class="file-dot"></div>
            <input type="text" id="filename-input" value="solution.c" spellcheck="false" />
            <span class="rename-hint">// rename</span>
          </div>
        </div>
        <div class="editor-actions">
          <select class="lang-select" id="lang-select" onchange="changeLang(this.value)">
            <option value="c">C</option>
            <!-- <option value="javascript">JavaScript</option>
            <option value="python">Python</option>
            <option value="java">Java</option>
            <option value="cpp">C++</option>
            <option value="go">Go</option> -->
          </select>
          <button class="btn-run" id="run-btn" onclick="runCode()" disabled>
            <svg width="8" height="10" viewBox="0 0 10 12" fill="currentColor"><path d="M0 0L10 6L0 12V0Z"/></svg>
            <span id="run-label">RUN</span>
          </button>
          <button class="btn-icon" title="Reset" onclick="resetCode()">↺</button>
          <button class="btn-icon download" title="Download" onclick="downloadCode()">↓</button>
        </div>
      </div>

      <div class="editor-wrap">
        <div class="line-numbers" id="line-numbers"></div>
        <textarea id="code-editor" spellcheck="false" autocorrect="off" autocapitalize="off"></textarea>
      </div>

      <div class="console" id="console-panel" style="height:180px">
        <div class="console-resize-bar" id="console-resize-bar"></div>
        <div class="console-header">
          <div class="console-title">
            <div class="console-dot" id="console-dot"></div>
            CONSOLE
          </div>
          <button class="console-clear" onclick="clearConsole()">[ CLEAR ]</button>
        </div>
        <div class="console-body" id="console-body">
          <div class="console-line sys">// ready.</div>
        </div>
      </div>
    </div>

  </div>
</div>

<div class="toast" id="toast">
  <span class="toast-icon">></span>
  <span id="toast-msg">done</span>
</div>

<script>
// ── CONFIG ────────────────────────────────────────────────────
const WS_URL = 'ws://localhost:8080/ws';

// ── PROBLEMS ──────────────────────────────────────────────────
const PROBLEMS = [];

const EXT = {c:'c'};
const LANG_NAME = {c:'C'};

let currentLang = 'c';
let currentProblem = PROBLEMS[0];
let ws = null;
let sessionID = sessionStorage.getItem('cf_sid') || '';
let sessionExpiry = null;
let timerInterval = null;
let isRunning = false;
let reconnectAttempts = 0;
let sidebarOpen = true;
let solved = new Set(JSON.parse(localStorage.getItem('cf_solved')||'[]'));

const editor = document.getElementById('code-editor');

// SIDEBAR
function toggleSidebar() {
  sidebarOpen = !sidebarOpen;
  document.getElementById('sidebar').classList.toggle('collapsed', !sidebarOpen);
  document.getElementById('sidebar-icon').textContent = sidebarOpen ? '◂' : '▸';
}

function renderList() {
  const list = document.getElementById('problem-list');
  list.innerHTML = '';
  PROBLEMS.forEach(p => {
    const el = document.createElement('div');
    el.className = `problem-item${p.id===currentProblem.id?' active':''}`;
    el.dataset.id = p.id;
    el.innerHTML = `
      <span class="prob-num">${String(p.id).padStart(2,'0')}</span>
      <span class="prob-dot ${p.difficulty}"></span>
      <span class="prob-name">${p.title}</span>
      <span class="prob-solved${solved.has(p.id)?' done':''}">✓</span>
      <div class="prob-tooltip">> ${p.title}</div>`;
    el.addEventListener('click', () => loadProblem(p));
    list.appendChild(el);
  });
}

// LOAD PROBLEM
function loadProblem(p) {
  currentProblem = p;
  document.querySelectorAll('.problem-item').forEach(el =>
    el.classList.toggle('active', parseInt(el.dataset.id)===p.id));

  const desc = document.getElementById('problem-description');
  desc.className = 'problem-loading';
  void desc.offsetWidth;

  const exHTML = p.examples.map((ex,i)=>`
    <div class="example-block">
      <div class="example-label">// example_${i+1}</div>
      <div class="example-io">
        <div class="io-line"><span class="io-key">input</span><span class="io-val">${ex.input}</span></div>
        <div class="io-line"><span class="io-key">output</span><span class="io-val">${ex.output}</span></div>
        ${ex.why?`<div class="io-line"><span class="io-key">why</span><span class="io-val">${ex.why}</span></div>`:''}
      </div>
    </div>`).join('');

  desc.innerHTML = `
    <div class="problem-header">
      <div class="problem-meta">
        <span class="problem-num-badge">#${String(p.id).padStart(2,'0')}</span>
        <span class="difficulty ${p.difficulty}">${p.difficulty}</span>
      </div>
      <div class="problem-title-text">${p.title}</div>
      <div class="problem-tags">${p.tags.map(t=>`<span class="problem-tag">${t}</span>`).join('')}</div>
    </div>
    <div class="divider"></div>
    <div class="problem-body">
      <p>${p.description}</p>
      <div class="note">${p.note}</div>
      ${exHTML}
      <div class="constraints">
        <div class="constraints-title">// constraints</div>
        <ul>${p.constraints.map(c=>`<li>${c}</li>`).join('')}</ul>
      </div>
    </div>`;

  document.getElementById('hints-content').innerHTML = p.hints.map((h,i)=>`
    <div class="hint-card" onclick="toggleHint(this)">
      <div class="hint-header">
        <span class="hint-num">// hint_${String(i+1).padStart(2,'0')}</span>
        <span class="hint-chevron">▾</span>
      </div>
      <div class="hint-body">${h}</div>
    </div>`).join('');

  document.getElementById('solution-content').innerHTML = `
    <p>${p.solution}</p>
    <div class="example-block" style="margin-top:14px">
      <div class="example-label">// complexity</div>
      <div class="example-io">
        <div class="io-line"><span class="io-key">time</span><span class="io-val">${p.complexity.time}</span></div>
        <div class="io-line"><span class="io-key">space</span><span class="io-val">${p.complexity.space}</span></div>
      </div>
    </div>`;

  editor.value = p.starterC || `// ${p.title}\n#include <stdio.h>\n\nint main() {\n  return 0;\n}`;
  updateLineNumbers();

  document.querySelectorAll('.panel-tab').forEach(t=>t.classList.remove('active'));
  document.querySelectorAll('.panel-content').forEach(t=>t.style.display='none');
  document.querySelector('.panel-tab').classList.add('active');
  document.getElementById('tab-problem').style.display='block';
}

// WEBSOCKET
function connect() {
  ws = new WebSocket(WS_URL);
  ws.onopen = () => {
    reconnectAttempts = 0;
    log('// connected to sandbox.','sys');
    send({type:'init',session_id:sessionID,language:currentLang});
  };
  ws.onmessage = e => handleMsg(JSON.parse(e.data));
  ws.onclose = () => {
    setRunning(false);
    document.getElementById('run-btn').disabled = true;
    reconnectAttempts++;
    const d = Math.min(1000*Math.pow(2,reconnectAttempts),15000);
    log(`// reconnecting in ${Math.round(d/1000)}s...`,'warn');
    setTimeout(connect,d);
  };
}

function send(d) { if(ws&&ws.readyState===1) ws.send(JSON.stringify(d)); }

function handleMsg(m) {
  switch(m.type) {
    case 'ready':
      sessionID=m.session_id;
      sessionStorage.setItem('cf_sid',sessionID);
      sessionExpiry=new Date(m.expires_at);
      document.getElementById('run-btn').disabled=false;
      log(`// sandbox ready — session ${sessionID}`,'ok');
      break;
    case 'output':
      if(m.stdout) log(m.stdout.trimEnd(),'sys');
      break;
    case 'done':
      setRunning(false);
      if(m.stdout) m.stdout.split('\n').forEach(l=>l&&log(l,'out'));
      if(m.stderr) m.stderr.split('\n').forEach(l=>l&&log(l,'err'));
      document.getElementById('console-dot').className=`console-dot ${m.exit_code===0?'ok':'err'}`;
      log(`// exit ${m.exit_code} · ${m.duration_ms}ms`, m.exit_code===0?'ok':'err');
      if(m.exit_code===0 && !solved.has(currentProblem.id)) {
        solved.add(currentProblem.id);
        localStorage.setItem('cf_solved',JSON.stringify([...solved]));
        renderList();
        showToast('✓', `${currentProblem.title} solved`);
      }
      break;
    case 'error':
      setRunning(false);
      log(`// error: ${m.message}`,'err');
      document.getElementById('console-dot').className='console-dot err';
      break;
    case 'expired':
      sessionID=''; sessionStorage.removeItem('cf_sid');
      clearInterval(timerInterval);
      document.getElementById('run-btn').disabled=true;
      log(`// session expired`,'warn');
      setTimeout(()=>send({type:'init',language:currentLang}),1000);
      break;
  }
}

function runCode() {
  if(isRunning||!sessionID) return;
  clearConsole(); setRunning(true);
  document.getElementById('console-dot').className='console-dot running';
  send({type:'run',session_id:sessionID,language:currentLang,code:editor.value});
}

function setRunning(v) {
  isRunning=v;
  document.getElementById('run-label').textContent=v?'RUNNING':'RUN';
  document.getElementById('run-btn').classList.toggle('running',v);
}

function log(text,type='out') {
  const body=document.getElementById('console-body');
  const el=document.createElement('div');
  el.className=`console-line ${type}`;
  el.textContent=text;
  body.appendChild(el);
  body.scrollTop=body.scrollHeight;
}

function clearConsole() {
  document.getElementById('console-body').innerHTML='';
  document.getElementById('console-dot').className='console-dot';
}

function changeLang(lang) {
  currentLang=lang;
  document.getElementById('filename-input').value=
    document.getElementById('filename-input').value.replace(/\.[^.]+$/,'.'+EXT[lang]);
  editor.value=lang==='c'?currentProblem.starterC:`// ${currentProblem.title}\n// ${LANG_NAME[lang]}\n`;
  updateLineNumbers();
  if(ws&&ws.readyState===1) {
    sessionID=''; sessionStorage.removeItem('cf_sid');
    log(`// switching to ${LANG_NAME[lang]}...`,'sys');
    send({type:'init',session_id:'',language:lang});
  }
}

function switchTab(btn,id) {
  document.querySelectorAll('.panel-tab').forEach(t=>t.classList.remove('active'));
  document.querySelectorAll('.panel-content').forEach(t=>t.style.display='none');
  btn.classList.add('active');
  document.getElementById(id).style.display='block';
}

function toggleHint(c) { c.classList.toggle('open'); }

function updateLineNumbers() {
  const lines=editor.value.split('\n');
  const cur=editor.value.substring(0,editor.selectionStart).split('\n').length;
  document.getElementById('line-numbers').innerHTML=
    lines.map((_,i)=>`<div class="line-num ${i+1===cur?'active':''}">${i+1}</div>`).join('');
}

editor.addEventListener('input', updateLineNumbers);
editor.addEventListener('keyup', updateLineNumbers);
editor.addEventListener('click', updateLineNumbers);
editor.addEventListener('scroll', ()=>{ document.getElementById('line-numbers').scrollTop=editor.scrollTop; });
editor.addEventListener('keydown', e=>{
  if(e.key==='Tab'){
    e.preventDefault();
    const s=editor.selectionStart;
    editor.value=editor.value.substring(0,s)+'  '+editor.value.substring(editor.selectionEnd);
    editor.selectionStart=editor.selectionEnd=s+2;
    updateLineNumbers();
  }
  if((e.ctrlKey||e.metaKey)&&e.key==='Enter'){ e.preventDefault(); runCode(); }
});

function resetCode() {
  editor.value=currentLang==='c'?currentProblem.starterC:`// ${currentProblem.title}\n`;
  updateLineNumbers();
  showToast('↺','reset');
}

function downloadCode() {
  const n=document.getElementById('filename-input').value||`solution.${EXT[currentLang]}`;
  const a=document.createElement('a');
  a.href=URL.createObjectURL(new Blob([editor.value],{type:'text/plain'}));
  a.download=n; a.click();
  showToast('↓', n);
}

function showToast(icon,msg) {
  const t=document.getElementById('toast');
  t.querySelector('.toast-icon').textContent=icon;
  document.getElementById('toast-msg').textContent=msg;
  t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2500);
}

// Horizontal resize (left panel)
const handle=document.getElementById('resize-handle');
const lp=document.getElementById('left-panel');
let isRes=false;
handle.addEventListener('mousedown',()=>{ isRes=true; handle.classList.add('dragging'); document.body.style.userSelect='none'; });
document.addEventListener('mousemove',e=>{ if(!isRes)return; const r=document.querySelector('.main').getBoundingClientRect(); lp.style.width=Math.max(240,Math.min(e.clientX-r.left,r.width-260))+'px'; });
document.addEventListener('mouseup',()=>{ isRes=false; handle.classList.remove('dragging'); document.body.style.userSelect=''; });

// Console vertical resize
(function(){
  const bar=document.getElementById('console-resize-bar');
  const panel=document.getElementById('console-panel');
  const rp=document.querySelector('.right-panel');
  let drag=false, startY=0, startH=0;
  bar.addEventListener('mousedown',e=>{ drag=true; startY=e.clientY; startH=panel.offsetHeight; bar.classList.add('dragging'); document.body.style.userSelect='none'; document.body.style.cursor='ns-resize'; });
  document.addEventListener('mousemove',e=>{ if(!drag)return; const delta=startY-e.clientY; const newH=Math.max(34,Math.min(startH+delta,rp.offsetHeight-60)); panel.style.height=newH+'px'; });
  document.addEventListener('mouseup',()=>{ if(!drag)return; drag=false; bar.classList.remove('dragging'); document.body.style.userSelect=''; document.body.style.cursor=''; });
})();

// INIT
renderList();
loadProblem(PROBLEMS[0]);
connect();
</script>
</body>
</html>
